app = "mamigues-ventas"
primary_region = "gru"

[build]

[env]
NODE_ENV = "production"
PORT = "3000"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[mounts]]
source = "mamigues_data"
destination = "/app/data"

[[mounts]]
source = "mamigues_auth"
destination = "/app/auth"

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
